<div id="animation-section">
  @if (isInfoCardVisible()) {
    <div id="ui-card">
      <h1>Traffic Analysis</h1>
      <div id="status" [style.backgroundColor]="displayStatusColour()">
        {{ displayStatusText() }}
      </div>
      <p id="desc" style="color: #ffffff">
        {{ displayDescriptionText() }}
      </p>

      <div class="stats">
        <div class="stat-row">
          Target Frequency:
          <span id="current-frequency" class="value" style="color: #58a6ff"
            >{{ displayFrequency() }} Hz</span
          >
        </div>
        <div class="stat-row">
          Buffer Occupancy:
          <span id="buffer-count" class="value">{{ displayBufferCount() }} packets</span>
        </div>
        <div class="stat-row">
          Backpressure:
          <span
            id="backpressure-state"
            class="value"
            [style.color]="displayBackpressureTextColour()"
          >
            {{ displayBackpressureText() }}
          </span>
        </div>
      </div>
    </div>
  }

  <div
    [style.height.px]="canvasHeight()"
    [style.pointer-events]="controlsEnabled() ? 'auto' : 'none'"
  >
    <canvas #rendererCanvas></canvas>
  </div>
</div>
